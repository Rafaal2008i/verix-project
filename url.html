<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verix | فحص الروابط</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">

        <img src="assets/images/logo.png" alt="Verix">

        <span>Verix</span>

    </div>

    <nav>

        <a href="index.html">الرئيسية</a>

    </nav>

</header>

<section class="hero">

    <div class="hero-logo">

        <img src="assets/images/logo.png" alt="Verix">

    </div>

    <span class="badge">
        🔗 فحص الروابط
    </span>

    <h1>
        تحقق من أي رابط
    </h1>

    <p>

        الصق الرابط وسيقوم Verix بتحليله
        باستخدام VirusTotal والذكاء الاصطناعي.

    </p>

    <div class="search-box">

        <input
            type="text"
            id="urlInput"
            placeholder="ألصق الرابط هنا...">

        <button id="checkBtn">

            تحقق الآن

        </button>

    </div>

    <div id="resultCard" class="result-card" style="display:none;">

        <h3>🛡️ نتيجة الفحص</h3>

        <div class="result-row">

            <span>الحالة</span>

            <strong id="status">...</strong>

        </div>

        <div class="result-row">

            <span>تم الفحص بواسطة</span>

            <strong id="engines">...</strong>

        </div>

        <div class="result-row">

            <span>اكتشف تهديدًا</span>

            <strong id="malicious">...</strong>

        </div>

        <div class="result-row">

            <span>الرابط</span>

            <strong id="checkedUrl">...</strong>

        </div>

        <button id="askAI" style="display:none;">
            ✨ اسأل Verix AI
        </button>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
